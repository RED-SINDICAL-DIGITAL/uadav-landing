<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔐 Admin UADAV - Acceso Seguro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            uadav: { dark: '#003366', primary: '#0066CC', sky: '#33CCFF' }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

  <!-- Login -->
  <div id="login-panel" class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full">
    <div class="text-center mb-8">
      <div class="w-20 h-20 bg-gradient-to-br from-uadav-dark to-uadav-primary rounded-full flex items-center justify-center mx-auto mb-4">
        <i class="fas fa-lock text-white text-3xl"></i>
      </div>
      <h1 class="text-2xl font-bold text-uadav-dark">Admin UADAV</h1>
      <p class="text-gray-600 text-sm mt-2">Acceso exclusivo para administradores</p>
    </div>

    <form onsubmit="return login(event)" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email Admin</label>
        <select id="admin-select" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-uadav-primary focus:border-transparent">
          <option value="">Seleccioná tu email...</option>
          <option value="marcosdinella@gmail.com">marcosdinella@gmail.com</option>
          <option value="miempresamarkus@gmail.com">miempresamarkus@gmail.com</option>
          <option value="gremiales@uadav.org.ar">gremiales@uadav.org.ar</option>
          <option value="beatdigitalok@gmail.com">beatdigitalok@gmail.com</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" 
               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-uadav-primary focus:border-transparent">
      </div>

      <button type="submit" 
              class="w-full bg-gradient-to-r from-uadav-dark to-uadav-primary text-white font-bold py-3 rounded-lg hover:shadow-lg transition transform hover:-translate-y-0.5">
        🔓 Ingresar
      </button>
    </form>

    <div id="error-msg" class="mt-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm hidden">
      ❌ Email o contraseña incorrectos
    </div>

    <p class="mt-6 text-xs text-center text-gray-500">
      <i class="fas fa-shield-alt mr-1"></i> Conexión segura encriptada
    </p>
  </div>

  <!-- Dashboard (oculto hasta login) -->
  <div id="dashboard" class="hidden fixed inset-0 bg-gray-100 overflow-auto">
    <!-- Header -->
    <header class="bg-gradient-to-r from-uadav-dark to-uadav-primary text-white shadow-lg sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
          <i class="fas fa-chart-line text-2xl"></i>
          <div>
            <h1 class="text-xl font-bold">Dashboard UADAV</h1>
            <p id="user-info" class="text-sm opacity-90"></p>
          </div>
        </div>
        <button onclick="logout()" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg transition text-sm">
          <i class="fas fa-sign-out-alt mr-2"></i>Salir
        </button>
      </div>
    </header>

    <!-- Contenido -->
    <main class="max-w-7xl mx-auto px-4 py-6">
      <!-- Stats -->
      <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
        <div class="bg-white p-5 rounded-xl shadow border-l-4 border-uadav-primary">
          <p class="text-gray-500 text-sm">Total Registros</p>
          <p id="stat-total" class="text-3xl font-bold text-uadav-dark">-</p>
        </div>
        <div class="bg-white p-5 rounded-xl shadow border-l-4 border-green-500">
          <p class="text-gray-500 text-sm">Contactados</p>
          <p id="stat-contactados" class="text-3xl font-bold text-green-600">-</p>
        </div>
        <div class="bg-white p-5 rounded-xl shadow border-l-4 border-yellow-500">
          <p class="text-gray-500 text-sm">Pendientes</p>
          <p id="stat-pendientes" class="text-3xl font-bold text-yellow-600">-</p>
        </div>
        <div class="bg-white p-5 rounded-xl shadow border-l-4 border-red-500">
          <p class="text-gray-500 text-sm">Urgentes</p>
          <p id="stat-urgentes" class="text-3xl font-bold text-red-600">-</p>
        </div>
      </div>

      <!-- Filtros -->
      <div class="bg-white p-4 rounded-xl shadow mb-6">
        <div class="flex flex-wrap gap-3">
          <input type="text" id="search" placeholder="🔍 Buscar..." 
                 class="flex-1 min-w-[200px] px-4 py-2 border rounded-lg">
          <select id="filter-estado" class="px-4 py-2 border rounded-lg">
            <option value="">Todos los estados</option>
            <option value="Nuevo">🟡 Nuevo</option>
            <option value="Contactado">🟢 Contactado</option>
            <option value="Afiliado">✅ Afiliado</option>
          </select>
          <button onclick="cargarDatos()" class="bg-uadav-primary text-white px-4 py-2 rounded-lg hover:bg-uadav-dark transition">
            <i class="fas fa-sync-alt mr-1"></i>Actualizar
          </button>
        </div>
      </div>

      <!-- Tabla -->
      <div class="bg-white rounded-xl shadow overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full">
            <thead class="bg-uadav-dark text-white">
              <tr>
                <th class="px-4 py-3 text-left text-sm">ID</th>
                <th class="px-4 py-3 text-left text-sm">Nombre</th>
                <th class="px-4 py-3 text-left text-sm">WhatsApp</th>
                <th class="px-4 py-3 text-left text-sm">Categoría</th>
                <th class="px-4 py-3 text-left text-sm">Estado</th>
                <th class="px-4 py-3 text-left text-sm">Acciones</th>
              </tr>
            </thead>
            <tbody id="tabla-body" class="divide-y divide-gray-100">
              <!-- Se llena con JS -->
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
  <script>
    // ============================================
    // CONFIGURACIÓN DE SEGURIDAD
    // ============================================
    
    // ⚠️ IMPORTANTE: En producción, usar autenticación real (Firebase Auth, etc.)
    // Esto es una solución básica para demo
    const ADMIN_PASSWORDS = {
      "marcosdinella@gmail.com": "admin123",
      "miempresamarkus@gmail.com": "admin123",
      "gremiales@uadav.org.ar": "admin123",
      "beatdigitalok@gmail.com": "admin123"
    };

    let currentAdmin = null;
    let registros = [];

    // ============================================
    // LOGIN
    // ============================================
    function login(e) {
      e.preventDefault();
      
      const email = document.getElementById('admin-select').value;
      const password = document.getElementById('password').value;
      
      if (!email || !password) {
        mostrarError("Completá todos los campos");
        return false;
      }
      
      if (ADMIN_PASSWORDS[email] === password) {
        currentAdmin = email;
        localStorage.setItem('uadav_admin', email);
        mostrarDashboard();
        return false;
      }
      
      mostrarError("Credenciales incorrectas");
      return false;
    }

    function mostrarError(msg) {
      const errorDiv = document.getElementById('error-msg');
      errorDiv.textContent = "❌ " + msg;
      errorDiv.classList.remove('hidden');
      setTimeout(() => errorDiv.classList.add('hidden'), 3000);
    }

    function mostrarDashboard() {
      document.getElementById('login-panel').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      document.getElementById('user-info').textContent = currentAdmin;
      cargarDatos();
    }

    function logout() {
      currentAdmin = null;
      localStorage.removeItem('uadav_admin');
      location.reload();
    }

    // ============================================
    // CARGA DE DATOS
    // ============================================
    async function cargarDatos() {
      if (!currentAdmin) return;
      
      // Simular datos (en producción, llamar a Apps Script)
      registros = generarDatosMock();
      
      actualizarStats();
      renderizarTabla();
    }

    function generarDatosMock() {
      return Array.from({length: 15}, (_, i) => ({
        id: `UADAV-${Math.random().toString(36).substr(2,6).toUpperCase()}`,
        nombre: [`María López`, `Juan Pérez`, `Ana García`][i%3] + ` ${i+1}`,
        whatsapp: `54911${Math.floor(10000000 + Math.random()*90000000)}`,
        artista: ['Cantante', 'Bailarín', 'Locutor'][i%3],
        estado: ['Nuevo', 'Contactado', 'Afiliado'][i%3],
        fecha: new Date().toLocaleDateString()
      }));
    }

    function actualizarStats() {
      document.getElementById('stat-total').textContent = registros.length;
      document.getElementById('stat-contactados').textContent = 
        registros.filter(r => r.estado === 'Contactado' || r.estado === 'Afiliado').length;
      document.getElementById('stat-pendientes').textContent = 
        registros.filter(r => r.estado === 'Nuevo').length;
      document.getElementById('stat-urgentes').textContent = "0";
    }

    function renderizarTabla() {
      const tbody = document.getElementById('tabla-body');
      tbody.innerHTML = registros.map(reg => `
        <tr class="hover:bg-gray-50">
          <td class="px-4 py-3 text-sm font-mono">${reg.id}</td>
          <td class="px-4 py-3 font-medium">${reg.nombre}</td>
          <td class="px-4 py-3">
            <a href="https://wa.me/${reg.whatsapp}" target="_blank" class="text-green-600 hover:underline">
              +${reg.whatsapp}
            </a>
          </td>
          <td class="px-4 py-3">${reg.artista}</td>
          <td class="px-4 py-3">
            <span class="px-2 py-1 rounded-full text-xs ${
              reg.estado === 'Nuevo' ? 'bg-yellow-100 text-yellow-700' :
              reg.estado === 'Contactado' ? 'bg-green-100 text-green-700' :
              'bg-blue-100 text-blue-700'
            }">${reg.estado}</span>
          </td>
          <td class="px-4 py-3">
            <a href="https://wa.me/${reg.whatsapp}" target="_blank" 
               class="text-green-600 hover:text-green-700 mr-3">
              <i class="fab fa-whatsapp text-xl"></i>
            </a>
            <button class="text-uadav-primary hover:text-uadav-dark">
              <i class="fas fa-edit"></i>
            </button>
          </td>
        </tr>
      `).join('');
    }

    // ============================================
    // CHECK SESSION
    // ============================================
    window.addEventListener('DOMContentLoaded', () => {
      const saved = localStorage.getItem('uadav_admin');
      if (saved && ADMIN_PASSWORDS[saved]) {
        currentAdmin = saved;
        mostrarDashboard();
      }
    });
  </script>
</body>
</html>
