<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SINDICATO OS | Engine Ultra Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #020617; color: #f8fafc; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        input, textarea { background: #0f172a !important; border: 1px solid #334155 !important; color: white !important; transition: all 0.3s; }
        input:focus { border-color: #6366f1 !important; box-shadow: 0 0 15px rgba(99, 102, 241, 0.3); }
    </style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-5xl font-black tracking-tighter bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">SINDICATO OS <span class="text-white">v3.0</span></h1>
                <p class="text-slate-400 font-medium">Arquitectura High-End para el sector gremial moderno.</p>
            </div>
            <div class="text-right">
                <span class="bg-indigo-500/10 text-indigo-400 px-4 py-2 rounded-full border border-indigo-500/20 text-xs font-bold uppercase tracking-widest">Enterprise Edition</span>
            </div>
        </div>

        <div class="grid lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-6">
                <div class="glass-panel p-8 rounded-[2.5rem] shadow-2xl">
                    <h2 class="text-xl font-bold mb-6 flex items-center gap-2"><span class="w-2 h-6 bg-indigo-500 rounded-full"></span> Configuración del Sindicato</h2>
                    
                    <div class="grid md:grid-cols-2 gap-6">
                        <div>
                            <label class="text-[10px] font-black uppercase text-slate-500 ml-2">Identidad (Siglas)</label>
                            <input type="text" id="siglas" class="w-full p-4 rounded-2xl mt-1" placeholder="UADAV">
                        </div>
                        <div>
                            <label class="text-[10px] font-black uppercase text-slate-500 ml-2">Color de Acento (Hex)</label>
                            <input type="color" id="color" class="w-full h-14 rounded-2xl mt-1 p-1 bg-transparent cursor-pointer" value="#6366f1">
                        </div>
                        <div class="md:col-span-2">
                            <label class="text-[10px] font-black uppercase text-slate-500 ml-2">Nombre Gremial Completo</label>
                            <input type="text" id="nombre" class="w-full p-4 rounded-2xl mt-1" placeholder="Unión Argentina de Artistas de Variedades">
                        </div>
                        <div>
                            <label class="text-[10px] font-black uppercase text-slate-500 ml-2">WhatsApp Directo</label>
                            <input type="text" id="wa" class="w-full p-4 rounded-2xl mt-1" placeholder="543413602783">
                        </div>
                        <div>
                            <label class="text-[10px] font-black uppercase text-slate-500 ml-2">Google Sheets CMS Link</label>
                            <input type="text" id="sheet" class="w-full p-4 rounded-2xl mt-1" placeholder="Link al CSV público">
                        </div>
                    </div>
                </div>

                <div class="glass-panel p-8 rounded-[2.5rem]">
                    <h2 class="text-xl font-bold mb-6 flex items-center gap-2"><span class="w-2 h-6 bg-cyan-500 rounded-full"></span> Hero & Marketing</h2>
                    <div class="space-y-4">
                        <input type="text" id="hTitle" class="w-full p-4 rounded-2xl" placeholder="Título Hero (Ej: EL FUTURO DEL ARTE)">
                        <textarea id="hSub" class="w-full p-4 rounded-2xl h-32" placeholder="Subtítulo persuasivo para jóvenes..."></textarea>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="bg-gradient-to-br from-indigo-600 to-purple-700 p-8 rounded-[2.5rem] shadow-xl relative overflow-hidden group">
                    <div class="relative z-10">
                        <h3 class="text-2xl font-black mb-2">¿Listo para publicar?</h3>
                        <p class="text-indigo-100 text-sm mb-6">El sistema generará una landing optimizada para SEO, móvil y alta conversión.</p>
                        <button onclick="buildAndDownload()" class="w-full bg-white text-indigo-900 font-black py-4 rounded-2xl hover:bg-indigo-50 transition-all shadow-lg active:scale-95">
                            GENERAR LANDING PRO
                        </button>
                    </div>
                    <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-white/10 rounded-full blur-3xl group-hover:scale-150 transition-all"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function buildAndDownload() {
            const config = {
                siglas: document.getElementById('siglas').value || 'UADAV',
                nombre: document.getElementById('nombre').value || 'Sindicato Profesional',
                color: document.getElementById('color').value,
                wa: document.getElementById('wa').value,
                sheet: document.getElementById('sheet').value,
                hTitle: document.getElementById('hTitle').value,
                hSub: document.getElementById('hSub').value
            };

            const fullCode = `<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>\${config.siglas} | Oficial</title>
    <script src="https://cdn.tailwindcss.com"><\/script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"><\/script>
    <script src="https://unpkg.com/lucide@latest"><\/script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: \${config.color}; }
        body { font-family: 'Outfit', sans-serif; background: #020617; color: white; }
        .glow { box-shadow: 0 0 50px -12px var(--accent); }
        .bento { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px); }
        .bg-mesh { background-image: radial-gradient(at 0% 0%, var(--accent) 0, transparent 50%), radial-gradient(at 100% 100%, #4f46e5 0, transparent 50%); opacity: 0.15; position: fixed; inset: 0; z-index: -1; }
    </style>
</head>
<body x-data="{ openMenu: false, chat: false }">
    <div class="bg-mesh"></div>

    <nav class="fixed top-6 inset-x-0 z-50 flex justify-center px-4">
        <div class="bento rounded-full px-6 py-3 flex items-center justify-between w-full max-w-5xl border-white/10 shadow-2xl">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full flex items-center justify-center font-black" style="background: var(--accent)">\${config.siglas[0]}</div>
                <span class="font-black text-xl tracking-tighter uppercase">\${config.siglas}</span>
            </div>
            <div class="hidden md:flex gap-8 text-[10px] font-black tracking-[0.2em] uppercase opacity-60">
                <a href="#" class="hover:opacity-100 transition">Inicio</a>
                <a href="#noticias" class="hover:opacity-100 transition">Noticias</a>
                <a href="#" class="hover:opacity-100 transition">Beneficios</a>
            </div>
            <a href="https://wa.me/\${config.wa}" class="bg-white text-black px-6 py-2 rounded-full text-xs font-black hover:scale-105 transition">UNITE</a>
        </div>
    </nav>

    <header class="h-screen flex flex-col justify-center items-center text-center px-6">
        <div class="inline-block mb-6 px-4 py-1 rounded-full border border-white/10 text-[10px] font-black tracking-widest uppercase bg-white/5">Digital First Union</div>
        <h1 class="text-6xl md:text-[120px] font-black leading-[0.85] tracking-tighter mb-8 italic uppercase">
            \${config.hTitle}
        </h1>
        <p class="max-w-xl text-slate-400 text-lg md:text-xl font-medium mb-12">
            \${config.hSub}
        </p>
        <div class="flex gap-4">
            <div class="w-16 h-16 rounded-3xl bento flex items-center justify-center glow animate-bounce">
                <i data-lucide="chevron-down"></i>
            </div>
        </div>
    </header>

    <section id="noticias" class="max-w-6xl mx-auto px-6 py-24">
        <div class="grid md:grid-cols-4 gap-4" id="news-grid">
            <div class="md:col-span-2 bento p-10 rounded-[3rem] min-h-[400px] flex flex-col justify-end">
                <h2 class="text-4xl font-black mb-4 uppercase">Actualidad <br><span style="color: var(--accent)">\${config.siglas}</span></h2>
                <p class="opacity-50">Gestionado vía Cloud CMS.</p>
            </div>
            </div>
    </section>

    <div class="fixed bottom-8 right-8 z-[100]" x-cloak>
        <button @click="chat = !chat" class="w-16 h-16 rounded-3xl glow flex items-center justify-center transition-all hover:rotate-12" style="background: var(--accent)">
            <i data-lucide="message-circle" x-show="!chat"></i>
            <i data-lucide="x" x-show="chat"></i>
        </button>
        <div x-show="chat" x-transition class="absolute bottom-20 right-0 w-80 bento p-6 rounded-[2rem] shadow-2xl">
            <h4 class="font-black text-xl mb-4">Gremio Virtual</h4>
            <div class="space-y-3 mb-4 h-48 overflow-y-auto text-sm opacity-80" id="chat-messages">
                <div class="bg-white/10 p-3 rounded-2xl rounded-tl-none">¡Hola! ¿Buscás info sobre aportes o beneficios?</div>
            </div>
            <input type="text" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-sm" placeholder="Escribí acá...">
        </div>
    </div>

    <script>
        lucide.createIcons();
        async function loadProNews() {
            try {
                const res = await fetch('\${config.sheet}');
                const data = await res.text();
                // Lógica de parseo CSV...
            } catch(e) {
                // Mock visual pro
                const grid = document.getElementById('news-grid');
                for(let i=0; i<3; i++) {
                    grid.innerHTML += \`
                        <div class="bento p-8 rounded-[3rem] hover:bg-white/5 transition cursor-pointer group">
                            <div class="w-10 h-10 rounded-full border border-white/20 mb-6 flex items-center justify-center group-hover:bg-white group-hover:text-black transition">
                                <i data-lucide="arrow-up-right"></i>
                            </div>
                            <h3 class="font-black text-xl leading-tight">NOVEDAD GREMIAL DEL DÍA</h3>
                        </div>
                    \`;
                }
                lucide.createIcons();
            }
        }
        loadProNews();
    <\/script>
</body>
</html>`;

            const blob = new Blob([fullCode], { type: 'text/html' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `landing-\${config.siglas.toLowerCase()}.html`;
            a.click();
        }
    </script>
</body>
</html>
