<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Landings para Sindicatos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans">

    <div class="container mx-auto py-10 px-6">
        <div class="max-w-4xl mx-auto bg-gray-800 p-8 rounded-2xl shadow-2xl border border-gray-700">
            <h1 class="text-3xl font-bold mb-2 text-blue-400">Constructor de Sindicatos v1.0</h1>
            <p class="text-gray-400 mb-8">Completa los datos para generar el sitio web automáticamente.</p>

            <form id="generatorForm" class="grid md:grid-cols-2 gap-6">
                <div class="space-y-4">
                    <h2 class="text-xl font-semibold border-b border-gray-700 pb-2">Identidad</h2>
                    <div>
                        <label class="block text-sm mb-1">Siglas (Ej: UADAV)</label>
                        <input type="text" id="siglas" class="w-full bg-gray-700 border-none rounded p-2" placeholder="UADAV" required>
                    </div>
                    <div>
                        <label class="block text-sm mb-1">Nombre Completo</label>
                        <input type="text" id="nombreLargo" class="w-full bg-gray-700 border-none rounded p-2" placeholder="Unión Argentina de..." required>
                    </div>
                    <div>
                        <label class="block text-sm mb-1">Color Principal (Hexadecimal)</label>
                        <input type="color" id="color" class="w-full h-10 bg-gray-700 border-none rounded p-1" value="#1e40af">
                    </div>
                    <div>
                        <label class="block text-sm mb-1">URL del Logo (Link de imagen)</label>
                        <input type="text" id="logoUrl" class="w-full bg-gray-700 border-none rounded p-2" placeholder="https://dominio.com/logo.png">
                    </div>
                </div>

                <div class="space-y-4">
                    <h2 class="text-xl font-semibold border-b border-gray-700 pb-2">Contenido y Redes</h2>
                    <div>
                        <label class="block text-sm mb-1">WhatsApp (Solo números con código de país)</label>
                        <input type="text" id="whatsapp" class="w-full bg-gray-700 border-none rounded p-2" placeholder="543413602783">
                    </div>
                    <div>
                        <label class="block text-sm mb-1">Link de Google Sheets (CSV)</label>
                        <input type="text" id="sheetUrl" class="w-full bg-gray-700 border-none rounded p-2" placeholder="Link del archivo publicado">
                    </div>
                    <div>
                        <label class="block text-sm mb-1">Título de Portada (Hero)</label>
                        <input type="text" id="heroTitle" class="w-full bg-gray-700 border-none rounded p-2" placeholder="Defendiendo tus derechos">
                    </div>
                    <div>
                        <label class="block text-sm mb-1">URL Imagen de Fondo</label>
                        <input type="text" id="heroImg" class="w-full bg-gray-700 border-none rounded p-2" placeholder="https://link-de-la-foto.jpg">
                    </div>
                </div>

                <div class="md:col-span-2 mt-6">
                    <button type="button" onclick="generateFile()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition shadow-lg uppercase tracking-wider">
                        Generar Archivo index.html
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function generateFile() {
            const data = {
                siglas: document.getElementById('siglas').value,
                nombre: document.getElementById('nombreLargo').value,
                color: document.getElementById('color').value,
                logo: document.getElementById('logoUrl').value,
                wa: document.getElementById('whatsapp').value,
                sheet: document.getElementById('sheetUrl').value,
                hTitle: document.getElementById('heroTitle').value,
                hImg: document.getElementById('heroImg').value
            };

            const template = `
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>\${data.nombre}</title>
    <script src="https://cdn.tailwindcss.com"><\/script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --p-color: \${data.color}; }
        .primary-bg { background-color: var(--p-color); }
        .primary-text { color: var(--p-color); }
        .border-primary { border-color: var(--p-color); }
    </style>
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="\${data.logo}" class="h-12">
                <span class="font-black text-2xl uppercase">\${data.siglas}</span>
            </div>
            <div class="hidden md:flex gap-6 font-bold text-gray-600">
                <a href="#">INICIO</a><a href="#noticias">NOTICIAS</a><a href="#">AFILIATE</a>
            </div>
        </div>
    </nav>

    <header class="relative h-[70vh] flex items-center bg-cover bg-center" style="background-image: url('\${data.hImg}')">
        <div class="absolute inset-0 bg-black opacity-60"></div>
        <div class="container mx-auto px-6 relative z-10 text-white">
            <h1 class="text-5xl md:text-7xl font-bold mb-4">\${data.hTitle}</h1>
            <a href="https://wa.me/\${data.wa}" class="primary-bg px-8 py-4 rounded-full font-bold inline-block">MÁS INFORMACIÓN</a>
        </div>
    </header>

    <section id="noticias" class="py-20 container mx-auto px-6">
        <h2 class="text-3xl font-bold mb-10">Últimas Noticias</h2>
        <div id="news-grid" class="grid md:grid-cols-3 gap-8 text-center text-gray-400 italic">
            Cargando noticias desde el sistema...
        </div>
    </section>

    <a href="https://wa.me/\${data.wa}" class="fixed bottom-6 right-6 bg-green-500 text-white p-4 rounded-full shadow-2xl">
        <i class="fab fa-whatsapp text-3xl"></i>
    </a>

    <script>
        async function loadNews() {
            try {
                const response = await fetch('\${data.sheet}');
                const text = await response.text();
                const rows = text.split('\\n').slice(1);
                const grid = document.getElementById('news-grid');
                grid.innerHTML = '';
                
                rows.forEach(row => {
                    const columns = row.split(',');
                    if(columns.length < 2) return;
                    grid.innerHTML += \`
                        <div class="bg-white p-6 rounded-xl shadow-md text-left not-italic border-b-4 border-primary">
                            <h3 class="font-bold text-xl mb-2 text-gray-800">\${columns[0]}</h3>
                            <p class="text-gray-600">\${columns[1]}</p>
                        </div>\`;
                });
            } catch(e) { console.log("Error cargando noticias"); }
        }
        loadNews();
    <\/script>
</body>
</html>`;

            // Lógica para descargar el archivo
            const blob = new Blob([template], { type: 'text/html' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'index.html';
            a.click();
        }
    </script>
</body>
</html>
