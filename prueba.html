<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="v-title">Sindicato 2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
        .gradient-text { background: linear-gradient(90deg, var(--p-color), #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .bento-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .bento-card:hover { transform: translateY(-5px) scale(1.02); }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900">

    <nav class="fixed top-4 inset-x-0 z-50 flex justify-center">
        <div class="glass border border-white/40 shadow-xl rounded-full px-6 py-3 flex items-center gap-8 w-[95%] max-w-4xl">
            <div class="flex items-center gap-2">
                <div id="v-logo-bg" class="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold text-xl shadow-lg"></div>
                <span id="v-name" class="font-black tracking-tighter text-xl"></span>
            </div>
            <div id="v-menu" class="hidden md:flex gap-6 text-sm font-bold text-slate-500 uppercase"></div>
            <a id="v-wa-nav" href="#" class="ml-auto bg-slate-900 text-white px-5 py-2 rounded-full text-sm font-bold hover:bg-slate-700 transition">CONTACTO</a>
        </div>
    </nav>

    <header class="pt-32 pb-20 px-6">
        <div class="max-w-6xl mx-auto text-center">
            <span class="inline-block px-4 py-1 rounded-full bg-indigo-100 text-indigo-600 text-xs font-bold mb-4 uppercase tracking-widest">Nueva Era Gremial</span>
            <h1 id="v-hero-title" class="text-6xl md:text-8xl font-black leading-[0.9] tracking-tighter mb-6"></h1>
            <p id="v-hero-sub" class="max-w-2xl mx-auto text-lg text-slate-500 font-medium mb-10 leading-relaxed"></p>
            <div class="flex flex-wrap justify-center gap-4">
                <button class="bg-slate-900 text-white px-10 py-5 rounded-2xl font-black text-lg shadow-2xl hover:scale-105 transition-all">AFILIATE ONLINE</button>
                <button class="bg-white border-2 border-slate-200 px-10 py-5 rounded-2xl font-black text-lg hover:bg-slate-50 transition-all">CONOCER MÁS</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 grid grid-cols-1 md:grid-cols-4 gap-4 pb-20">
        <div class="md:col-span-2 md:row-span-2 bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm flex flex-col justify-between bento-card">
            <h3 class="text-3xl font-bold tracking-tight mb-4">Noticias de <span class="gradient-text" id="v-name-news"></span></h3>
            <div id="v-news-container" class="space-y-4">
                </div>
        </div>

        <div id="card-color" class="md:col-span-2 h-64 rounded-[2rem] p-8 text-white flex flex-col justify-end bento-card relative overflow-hidden">
             <div class="absolute top-0 right-0 w-32 h-32 bg-white/20 blur-3xl rounded-full -mr-10 -mt-10"></div>
             <h3 class="text-4xl font-black leading-none">TURISMO<br>JOVEN</h3>
             <p class="mt-2 opacity-80 font-bold uppercase text-xs tracking-widest">Nuevos destinos 2026</p>
        </div>

        <div class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm bento-card">
            <div class="w-12 h-12 rounded-xl bg-orange-100 flex items-center justify-center text-orange-600 mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            </div>
            <h4 class="font-black text-xl mb-1">CAPACITACIÓN</h4>
            <p class="text-sm text-slate-500 font-medium leading-tight">Cursos de IA y medios digitales.</p>
        </div>

        <div class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm bento-card">
             <div class="w-12 h-12 rounded-xl bg-green-100 flex items-center justify-center text-green-600 mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>
            </div>
            <h4 class="font-black text-xl mb-1">LEGALES</h4>
            <p class="text-sm text-slate-500 font-medium leading-tight">Asesoría 24/7 por WhatsApp.</p>
        </div>
    </main>

    <button onclick="toggleChat()" class="fixed bottom-6 right-6 w-16 h-16 bg-slate-900 text-white rounded-2xl shadow-2xl flex items-center justify-center hover:scale-110 transition-all z-50">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" /></svg>
    </button>

    <script>
        // ESTOS DATOS SE GENERAN DESDE TU ADMIN.HTML
        const CONFIG = {
            siglas: "UADAV",
            nombre: "Artistas de Variedades",
            color: "#6366f1", // Color moderno: Indigo
            wa: "543413602783",
            heroTitle: "TU ARTE ES UN DERECHO.",
            heroSub: "La unión que protege a los artistas de la nueva generación. Desde el escenario hasta el streaming, estamos con vos.",
            menu: ["Comunidad", "Novedades", "Escalas", "Turismo"],
            sheetUrl: "LINK_DE_TU_EXCEL_AQUÍ"
        };

        // Inyectar Configuración
        document.documentElement.style.setProperty('--p-color', CONFIG.color);
        document.getElementById('v-title').innerText = CONFIG.siglas;
        document.getElementById('v-name').innerText = CONFIG.siglas;
        document.getElementById('v-name-news').innerText = CONFIG.siglas;
        document.getElementById('v-hero-title').innerText = CONFIG.heroTitle;
        document.getElementById('v-hero-sub').innerText = CONFIG.heroSub;
        document.getElementById('v-logo-bg').style.backgroundColor = CONFIG.color;
        document.getElementById('v-logo-bg').innerText = CONFIG.siglas[0];
        document.getElementById('card-color').style.backgroundColor = CONFIG.color;
        document.getElementById('v-wa-nav').href = `https://wa.me/${CONFIG.wa}`;

        // Cargar Menú
        const menuContainer = document.getElementById('v-menu');
        CONFIG.menu.forEach(item => {
            menuContainer.innerHTML += `<a href="#" class="hover:text-slate-900 transition cursor-pointer">${item}</a>`;
        });

        // Mock de Noticias (Diseño Moderno de Tarjetas)
        const news = [
            {t: "Nuevas escalas para Streaming", d: "Actualizamos los valores para shows digitales."},
            {t: "Convenio con Ticketing", d: "Beneficios exclusivos en venta de entradas."},
            {t: "Workshop IA Aplicada", d: "Cómo usar herramientas de IA en tus shows."}
        ];

        const newsBox = document.getElementById('v-news-container');
        newsBox.innerHTML = news.map(n => `
            <div class="group p-4 rounded-2xl bg-slate-50 border border-slate-100 hover:bg-white hover:shadow-lg transition-all cursor-pointer">
                <h4 class="font-bold text-lg group-hover:primary-text">${n.t}</h4>
                <p class="text-sm text-slate-500">${n.d}</p>
            </div>
        `).join('');
    </script>
</body>
</html>
